<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow behind sun -->
  <ellipse cx="600" cy="280" rx="220" ry="220" fill="url(#glow)"/>

  <!-- Sun rays -->
  <g stroke="#F59E0B" stroke-width="7" stroke-linecap="round" opacity="0.7">
    <line x1="600" y1="120" x2="600" y2="148"/>
    <line x1="600" y1="412" x2="600" y2="440"/>
    <line x1="440" y1="280" x2="468" y2="280"/>
    <line x1="732" y1="280" x2="760" y2="280"/>
    <line x1="487" y1="167" x2="507" y2="187"/>
    <line x1="693" y1="373" x2="713" y2="393"/>
    <line x1="713" y1="167" x2="693" y2="187"/>
    <line x1="507" y1="373" x2="487" y2="393"/>
  </g>

  <!-- Sun circle -->
  <circle cx="600" cy="280" r="80" fill="#FCD34D" opacity="0.15"/>
  <circle cx="600" cy="280" r="68" fill="#FCD34D" opacity="0.2"/>
  <circle cx="600" cy="280" r="56" fill="#FBBF24"/>

  <!-- App name -->
  <text x="600" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="54" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">demooiweerapp</text>

  <!-- Tagline -->
  <text x="600" y="548" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="#93c5fd" text-anchor="middle" letter-spacing="0">Het weer, maar dan mooier ☀️</text>

  <!-- URL pill -->
  <rect x="488" y="574" width="224" height="36" rx="18" fill="rgba(255,255,255,0.08)"/>
  <text x="600" y="597" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="rgba(255,255,255,0.5)" text-anchor="middle">demooiweerapp.nl</text>
</svg>
